<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Vision AI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gray-50:  #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-700: #374151;
    --gray-900: #111827;
    --blue:     #2563eb;
    --blue-h:   #1d4ed8;
    --green:    #16a34a;
    --red:      #dc2626;
    --yellow:   #ca8a04;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--gray-900);
    background: var(--gray-50);
  }

  /* ─── Top nav ─────────────────────────────────────────────────────────── */
  .topbar {
    height: 52px;
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-logo {
    font-size: 15px;
    font-weight: 600;
    color: var(--gray-900);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topbar-logo svg { color: var(--blue); }
  .status-pill {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--gray-500);
  }
  .status-pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gray-300);
  }
  .status-pill.ok .dot   { background: var(--green); }
  .status-pill.warn .dot { background: var(--yellow); }
  .status-pill.err .dot  { background: var(--red); }

  /* ─── Layout ──────────────────────────────────────────────────────────── */
  .shell { display: flex; min-height: calc(100vh - 52px); }

  /* ─── Sidebar ─────────────────────────────────────────────────────────── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid var(--gray-200);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .sidebar-section h4 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--gray-400);
    margin-bottom: 8px;
  }

  .face-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 12px;
    font-weight: 500;
    margin: 2px;
  }
  .face-chip button {
    background: none; border: none; cursor: pointer;
    color: var(--gray-400); font-size: 13px; line-height: 1; padding: 0 2px;
  }
  .face-chip button:hover { color: var(--red); }

  .upload-label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 10px;
    border: 1px dashed var(--gray-300);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: var(--gray-500);
    transition: border-color .15s, color .15s;
    margin-top: 6px;
  }
  .upload-label:hover { border-color: var(--blue); color: var(--blue); }
  .upload-label input { display: none; }

  .obj-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    font-size: 12px;
    color: var(--gray-700);
  }
  .obj-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ─── Main content ────────────────────────────────────────────────────── */
  .main { flex: 1; padding: 20px; overflow-y: auto; }

  /* ─── Tabs ────────────────────────────────────────────────────────────── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--gray-200);
    margin-bottom: 16px;
  }
  .tab-btn {
    padding: 8px 16px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-500);
    cursor: pointer;
    transition: color .15s;
  }
  .tab-btn:hover { color: var(--gray-900); }
  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── Cards ───────────────────────────────────────────────────────────── */
  .card {
    background: #fff;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-700);
    margin-bottom: 12px;
  }

  /* ─── Buttons ─────────────────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-primary:hover { background: var(--blue-h); border-color: var(--blue-h); }
  .btn-secondary { background: #fff; color: var(--gray-700); border-color: var(--gray-300); }
  .btn-secondary:hover { background: var(--gray-50); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ─── Form controls ───────────────────────────────────────────────────── */
  select {
    padding: 6px 10px;
    border: 1px solid var(--gray-300);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    background: #fff;
    color: var(--gray-900);
  }
  input[type="range"] { width: 100px; accent-color: var(--blue); vertical-align: middle; }
  .field-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .field-label { font-size: 12px; color: var(--gray-500); }

  /* ─── Camera ──────────────────────────────────────────────────────────── */
  .video-wrap {
    position: relative;
    background: var(--gray-900);
    border-radius: 6px;
    overflow: hidden;
    aspect-ratio: 16/9;
    max-width: 100%;
  }
  #localVideo, #annotatedCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
  }
  #localVideo { z-index: 1; }
  #annotatedCanvas { z-index: 2; }

  /* ─── Drop zone ───────────────────────────────────────────────────────── */
  .drop-zone {
    border: 2px dashed var(--gray-200);
    border-radius: 8px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    display: block;
  }
  .drop-zone:hover { border-color: var(--blue); background: #eff6ff; }
  .drop-zone input { display: none; }
  .drop-zone .dz-icon { font-size: 28px; margin-bottom: 8px; }
  .drop-zone p { font-size: 13px; color: var(--gray-500); }
  .drop-zone small { font-size: 11px; color: var(--gray-400); }

  /* ─── Image preview ───────────────────────────────────────────────────── */
  .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .img-pane {
    border: 1px solid var(--gray-200);
    border-radius: 6px;
    overflow: hidden;
    background: var(--gray-100);
  }
  .img-pane img { width: 100%; display: block; }
  .img-pane-label {
    font-size: 11px; font-weight: 500; color: var(--gray-500);
    padding: 5px 8px; background: #fff; border-top: 1px solid var(--gray-200);
  }
  .img-pane-empty {
    display: flex; align-items: center; justify-content: center;
    min-height: 120px; font-size: 12px; color: var(--gray-400);
  }

  /* ─── Detections ──────────────────────────────────────────────────────── */
  .detections { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .det-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 500;
    background: var(--gray-100); border: 1px solid var(--gray-200); color: var(--gray-700);
  }
  .det-tag .color-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ─── Progress ────────────────────────────────────────────────────────── */
  .progress { height: 4px; background: var(--gray-100); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress-bar { height: 100%; background: var(--blue); width: 0; transition: width .3s; }

  /* ─── Alert ───────────────────────────────────────────────────────────── */
  .alert { padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-top: 8px; }
  .alert-info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }

  /* ─── Toast ───────────────────────────────────────────────────────────── */
  .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 6px; }
  .toast {
    background: var(--gray-900); color: #fff; padding: 10px 14px;
    border-radius: 6px; font-size: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.15);
    animation: slideIn .2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
      .sidebar { 
        display: block;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--gray-200);
      }
      .shell { flex-direction: column; }
      .img-grid { grid-template-columns: 1fr; }
      .main { padding: 12px; }
    }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/>
      <path d="M3 7V5a2 2 0 0 1 2-2h2M3 17v2a2 2 0 0 0 2 2h2m10-16h2a2 2 0 0 1 2 2v2m0 10v2a2 2 0 0 1-2 2h-2"/>
    </svg>
    Smart Vision AI
  </div>
  <div class="status-pill" id="statusPill">
    <span class="dot"></span>
    <span id="statusText">Connecting…</span>
  </div>
</header>

<div class="shell">

  <aside class="sidebar">
    <div class="sidebar-section">
      <h4>Known Persons</h4>
      <div id="knownFacesList">
        <span style="font-size:12px;color:var(--gray-400);">None enrolled</span>
      </div>
      <label class="upload-label">
        <input type="file" id="faceUpload" accept="image/*" multiple />
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload face images
      </label>
      <div id="faceUploadMsg" style="font-size:11px;color:var(--gray-400);margin-top:4px;"></div>
    </div>

    <div class="sidebar-section">
      <h4>Detected Classes</h4>
      <div id="targetList"></div>
    </div>

    <!-- <div class="sidebar-section" style="margin-top:auto;">
      <h4>Model Status</h4>
      <div style="font-size:11px;color:var(--gray-500);line-height:1.8;">
        <div id="infoYolo">YOLO: —</div>
        <div id="infoFace">Face Rec: —</div>
      </div>
    </div> -->
  </aside>

  <main class="main">
    <div class="tabs">
      <button class="tab-btn active" data-tab="camera">Live Camera</button>
      <button class="tab-btn" data-tab="image">Image</button>
      <button class="tab-btn" data-tab="video">Video</button>
    </div>

    <!-- Camera -->
    <div class="tab-panel active" id="tab-camera">
      <div class="card">
        <div class="card-title">Live Camera Detection</div>
        <div class="field-row" style="margin-bottom:12px;">
          <button class="btn btn-primary" id="startCamBtn">Start</button>
          <button class="btn btn-secondary" id="stopCamBtn" disabled>Stop</button>
          <select id="camSelect"></select>
          <label class="field-label" style="display:flex;align-items:center;gap:5px;">
            <input type="checkbox" id="mirrorChk" checked /> Mirror
          </label>
        </div>
        <div class="video-wrap">
          <video id="localVideo" autoplay playsinline muted></video>
          <canvas id="annotatedCanvas"></canvas>
        </div>
        <div class="detections" id="cameraLabels"></div>
        <div class="alert alert-info" style="margin-top:10px;">
          Frames are sent every 200 ms via WebSocket. Detection runs on the server.
        </div>
      </div>
    </div>

    <!-- Image -->
    <div class="tab-panel" id="tab-image">
      <div class="card">
        <div class="card-title">Image Detection</div>
        <label class="drop-zone" id="imgDropZone">
          <input type="file" id="imgFile" accept="image/*" />
          <div class="dz-icon">🖼</div>
          <p>Click to select or drag an image here</p>
          <small>JPG, PNG, WEBP</small>
        </label>
        <div class="field-row" style="margin-top:12px;">
          <button class="btn btn-primary" id="detectImgBtn" disabled>Run Detection</button>
          <span class="field-label">Confidence:</span>
          <input type="range" id="imgConf" min="0.1" max="0.9" step="0.05" value="0.4" />
          <span id="imgConfVal" class="field-label">40%</span>
        </div>
        <div class="progress" id="imgProgress" style="display:none;"><div class="progress-bar" style="width:60%;"></div></div>
        <div class="img-grid" id="imgResults"></div>
        <div class="detections" id="imgLabels"></div>
      </div>
    </div>

    <!-- Video -->
    <div class="tab-panel" id="tab-video">
      <div class="card">
        <div class="card-title">Video Detection</div>
        <label class="drop-zone" id="vidDropZone">
          <input type="file" id="vidFile" accept="video/*" />
          <div class="dz-icon">🎬</div>
          <p>Click to select or drag a video here</p>
          <small>MP4, AVI, MOV</small>
        </label>
        <div class="field-row" style="margin-top:12px;">
          <button class="btn btn-primary" id="processVidBtn" disabled>Process Video</button>
          <span class="field-label">Confidence:</span>
          <input type="range" id="vidConf" min="0.1" max="0.9" step="0.05" value="0.4" />
          <span id="vidConfVal" class="field-label">40%</span>
        </div>
        <div class="progress" id="vidProgress" style="display:none;"><div class="progress-bar" id="vidBar"></div></div>
        <p id="vidStatus" style="font-size:12px;color:var(--gray-500);margin-top:6px;"></p>
        <div id="vidDownload" style="margin-top:12px;"></div>
      </div>
    </div>
  </main>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
const API = window.location.origin;

const CLASS_COLORS = {
  "bottle":       "#f97316",
  "person":       "#8b5cf6",
  "cell phone":   "#10b981",
  "laptop":       "#3b82f6",
  "potted plant": "#22c55e",
};

function showToast(msg) {
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.getElementById("toastWrap").appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function fetchStatus() {
  try {
    const r = await fetch(`${API}/api/status`);
    const d = await r.json();
    const pill = document.getElementById("statusPill");
    const txt  = document.getElementById("statusText");
    if (!d.models_loaded) {
      pill.className = "status-pill warn"; txt.textContent = "Loading models…";
    } else if (d.yolo && d.face_recognition) {
      pill.className = "status-pill ok";   txt.textContent = "All systems ready";
    } else {
      pill.className = "status-pill warn"; txt.textContent = "Partial load";
    }
    const infoYolo = document.getElementById("infoYolo");
        const infoFace = document.getElementById("infoFace");
        if (infoYolo) infoYolo.textContent = `YOLO: ${d.yolo ? "loaded" : "not found"}`;
        if (infoFace) infoFace.textContent = `Face Rec: ${d.face_recognition ? "loaded" : "not found"}`;
    renderKnownFaces(d.known_faces);
  } catch {
    document.getElementById("statusPill").className = "status-pill err";
    document.getElementById("statusText").textContent = "Connecting…";
    setTimeout(fetchStatus, 3000);
  }
}

function renderKnownFaces(names) {
  const el = document.getElementById("knownFacesList");
  el.innerHTML = names.length
    ? names.map(n => `<span class="face-chip">${n}<button onclick="deleteFace('${n}')" title="Remove">×</button></span>`).join("")
    : `<span style="font-size:12px;color:var(--gray-400);">None enrolled</span>`;
}

function renderTargetList() {
  document.getElementById("targetList").innerHTML =
    Object.entries(CLASS_COLORS).map(([cls, color]) => `
      <div class="obj-row">
        <div class="obj-swatch" style="background:${color};"></div>
        ${cls.charAt(0).toUpperCase() + cls.slice(1)}
      </div>`).join("");
}

function renderDetections(id, labels) {
  document.getElementById(id).innerHTML = [...new Set(labels)].map(l => `
    <span class="det-tag">
      <span class="color-dot" style="background:${CLASS_COLORS[l] || CLASS_COLORS["person"]};"></span>
      ${l}
    </span>`).join("");
}

// Tabs
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add("active");
  });
});

// Face upload
document.getElementById("faceUpload").addEventListener("change", async function() {
  if (!this.files.length) return;
  const fd = new FormData();
  for (const f of this.files) fd.append("files", f);
  document.getElementById("faceUploadMsg").textContent = "Uploading…";
  try {
    const r = await fetch(`${API}/api/faces/upload`, { method: "POST", body: fd });
    const d = await r.json();
    showToast(r.ok ? `Enrolled: ${d.enrolled.join(", ") || "no faces detected"}` : `Error: ${d.detail}`);
    fetchStatus();
  } catch { showToast("Upload failed"); }
  document.getElementById("faceUploadMsg").textContent = "";
  this.value = "";
});

async function deleteFace(name) {
  const r = await fetch(`${API}/api/faces/${encodeURIComponent(name)}`, { method: "DELETE" });
  if (r.ok) { showToast(`Removed: ${name}`); fetchStatus(); }
}

// Camera
let stream, ws, camTimer;
const video = document.getElementById("localVideo");
const canvas = document.getElementById("annotatedCanvas");
const ctx = canvas.getContext("2d");
const cap = document.createElement("canvas");
const capCtx = cap.getContext("2d");

async function populateCameras() {
  try {
    await navigator.mediaDevices.getUserMedia({ video: true });
    const devices = await navigator.mediaDevices.enumerateDevices();
    const sel = document.getElementById("camSelect");
    devices.filter(d => d.kind === "videoinput").forEach((d, i) => {
      const o = document.createElement("option");
      o.value = d.deviceId;
      o.textContent = d.label || `Camera ${i + 1}`;
      sel.appendChild(o);
    });
  } catch {}
}

document.getElementById("startCamBtn").addEventListener("click", async () => {
  const deviceId = document.getElementById("camSelect").value;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: deviceId ? { deviceId: { exact: deviceId } } : true, audio: false
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById("startCamBtn").disabled = true;
    document.getElementById("stopCamBtn").disabled = false;

    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws/detect`);
    ws.onopen = () => { camTimer = setInterval(sendFrame, 200); };
    ws.onmessage = e => {
      const d = JSON.parse(e.data);
      if (d.image) drawAnnotated(d.image);
      if (d.labels) renderDetections("cameraLabels", d.labels);
    };
    ws.onerror = () => showToast("WebSocket error");
    ws.onclose = () => clearInterval(camTimer);
  } catch (e) { showToast(`Camera error: ${e.message}`); }
});

document.getElementById("stopCamBtn").addEventListener("click", () => {
  clearInterval(camTimer);
  if (ws) ws.close();
  if (stream) stream.getTracks().forEach(t => t.stop());
  video.srcObject = null;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById("startCamBtn").disabled = false;
  document.getElementById("stopCamBtn").disabled = true;
  document.getElementById("cameraLabels").innerHTML = "";
});

function sendFrame() {
  if (!ws || ws.readyState !== WebSocket.OPEN || !video.videoWidth) return;
  cap.width = video.videoWidth; cap.height = video.videoHeight;
  if (document.getElementById("mirrorChk").checked) {
    capCtx.save(); capCtx.scale(-1, 1); capCtx.drawImage(video, -cap.width, 0); capCtx.restore();
  } else { capCtx.drawImage(video, 0, 0); }
  cap.toBlob(b => b?.arrayBuffer().then(buf => ws.send(buf)), "image/jpeg", 0.7);
}

function drawAnnotated(dataUrl) {
  const img = new Image();
  img.onload = () => {
    canvas.width = video.videoWidth || img.width;
    canvas.height = video.videoHeight || img.height;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  };
  img.src = dataUrl;
}

// Image detection
const imgConf = document.getElementById("imgConf");
imgConf.addEventListener("input", () =>
  document.getElementById("imgConfVal").textContent = Math.round(imgConf.value * 100) + "%");

document.getElementById("imgFile").addEventListener("change", function() {
  document.getElementById("detectImgBtn").disabled = !this.files.length;
  if (this.files[0]) {
    const url = URL.createObjectURL(this.files[0]);
    document.getElementById("imgResults").innerHTML = `
      <div class="img-pane"><img src="${url}" /><div class="img-pane-label">Original</div></div>
      <div class="img-pane" id="imgResultPane"><div class="img-pane-empty">Result will appear here</div></div>`;
    document.getElementById("imgLabels").innerHTML = "";
  }
});

document.getElementById("detectImgBtn").addEventListener("click", async () => {
  const fd = new FormData();
  fd.append("file", document.getElementById("imgFile").files[0]);
  fd.append("conf", imgConf.value);
  document.getElementById("imgProgress").style.display = "block";
  document.getElementById("detectImgBtn").disabled = true;
  try {
    const r = await fetch(`${API}/api/detect/image`, { method: "POST", body: fd });
    const d = await r.json();
    document.getElementById("imgProgress").style.display = "none";
    document.getElementById("imgResultPane").innerHTML =
      `<img src="${d.image}" style="width:100%;display:block;" /><div class="img-pane-label">Annotated</div>`;
    renderDetections("imgLabels", d.unique || []);
    if (!(d.unique || []).length) showToast("No target objects detected.");
  } catch { showToast("Detection failed"); }
  document.getElementById("imgProgress").style.display = "none";
  document.getElementById("detectImgBtn").disabled = false;
});

// Video detection
const vidConf = document.getElementById("vidConf");
vidConf.addEventListener("input", () =>
  document.getElementById("vidConfVal").textContent = Math.round(vidConf.value * 100) + "%");

document.getElementById("vidFile").addEventListener("change", function() {
  document.getElementById("processVidBtn").disabled = !this.files.length;
});

document.getElementById("processVidBtn").addEventListener("click", async () => {
  const fd = new FormData();
  fd.append("file", document.getElementById("vidFile").files[0]);
  fd.append("conf", vidConf.value);
  document.getElementById("processVidBtn").disabled = true;
  document.getElementById("vidProgress").style.display = "block";
  document.getElementById("vidStatus").textContent = "Processing… this may take a moment.";
  document.getElementById("vidDownload").innerHTML = "";

  let pct = 0;
  const anim = setInterval(() => {
    pct = Math.min(pct + 0.8, 90);
    document.getElementById("vidBar").style.width = pct + "%";
  }, 300);

  try {
    const r = await fetch(`${API}/api/detect/video`, { method: "POST", body: fd });
    clearInterval(anim);
    document.getElementById("vidBar").style.width = "100%";
    if (!r.ok) throw new Error(await r.text());
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    document.getElementById("vidStatus").textContent =
      `Done. Detections: ${r.headers.get("X-Detections") || "none"}`;
    document.getElementById("vidDownload").innerHTML = `
      <a href="${url}" download="annotated_video.mp4" class="btn btn-primary" style="text-decoration:none;margin-bottom:8px;display:inline-flex;">
        Download Annotated Video
      </a>
      <video controls src="${url}" style="width:100%;border-radius:6px;border:1px solid var(--gray-200);display:block;margin-top:8px;"></video>`;
  } catch (e) {
    clearInterval(anim);
    document.getElementById("vidStatus").textContent = "Error: " + e.message;
    showToast("Video processing failed");
  }
  document.getElementById("vidProgress").style.display = "none";
  document.getElementById("processVidBtn").disabled = false;
});

// Init
renderTargetList();
populateCameras();
fetchStatus();
setInterval(fetchStatus, 10000);
</script>
</body>
</html>
